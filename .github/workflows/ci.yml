name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Smoke (flow plan)
        run: |
          node bin/flow.js plan --profile minimal --json
          node bin/flow.js plan --profile mini --json
          node bin/flow.js plan --profile standard --json
          node bin/flow.js plan --profile team --json

      - name: Smoke (flow help + version)
        run: |
          node bin/flow.js --version
          node bin/flow.js help > /dev/null

      - name: Reject unknown profile
        run: |
          set +e
          node bin/flow.js plan --profile bogus
          rc=$?
          if [ $rc -eq 0 ]; then
            echo "Expected non-zero exit for bogus profile, got 0"
            exit 1
          fi

      - name: Smoke (headless flow init --yes --dry-run in clean tmp)
        run: |
          set -e
          # The headless orchestrator chains detect → upstreams → MCPs →
          # scaffold. We run --dry-run so the upstream dispatchers
          # short-circuit on subset (or take the runCommand dry-run path
          # for caveman's subset=full) and never actually shell out to
          # network installers. We assert: zero-exit, no files actually
          # written to the tmp cwd (since --dry-run), and the manifest
          # mentions flow.config.yaml + sprint.yaml.
          REPO=$(pwd)
          TMP=$(mktemp -d)
          cd "$TMP"
          OUTPUT=$(node "$REPO/bin/flow.js" init --profile minimal --yes --dry-run 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "flow init complete" || (echo "::error::missing completion banner"; exit 1)
          echo "$OUTPUT" | grep -q "flow.config.yaml" || (echo "::error::manifest missing flow.config.yaml"; exit 1)
          echo "$OUTPUT" | grep -q "sprint.yaml" || (echo "::error::manifest missing sprint.yaml"; exit 1)
          # Strict: dry-run must NOT have created any files in cwd.
          if [ "$(find . -type f 2>/dev/null | wc -l)" != "0" ]; then
            echo "::error::dry-run leaked files into cwd:"
            find . -type f
            exit 1
          fi
          cd "$REPO"
          rm -rf "$TMP"

      - name: Smoke (flow sprint subcommands in clean tmp)
        run: |
          set -e
          REPO=$(pwd)
          TMP=$(mktemp -d)
          mkdir -p "$TMP/docs/flow"
          cat > "$TMP/docs/flow/sprint.yaml" <<'YAML'
          version: 1
          project: ci-smoke
          epics:
            - { id: E1, title: Foundation, status: backlog }
          stories:
            - { id: E1-001, title: Bootstrap, epic: E1, status: backlog }
            - { id: E1-002, title: CI, epic: E1, status: review }
          YAML
          cd "$TMP"
          # status → exit 0, mentions both stories
          node "$REPO/bin/flow.js" sprint status | tee /tmp/sprint-status.out
          grep -q "E1-001" /tmp/sprint-status.out
          grep -q "E1-002" /tmp/sprint-status.out
          # next → flips first backlog to doing
          node "$REPO/bin/flow.js" sprint next | grep -q "E1-001"
          grep -q "status: doing" docs/flow/sprint.yaml
          # done E1-002 → flips review to done
          node "$REPO/bin/flow.js" sprint done E1-002 | grep -q "E1-002 done"
          grep -q "status: done" docs/flow/sprint.yaml
          # add → appends a story
          node "$REPO/bin/flow.js" sprint add --id E1-003 --title "New work" --epic E1 | grep -q "E1-003"
          grep -q "E1-003" docs/flow/sprint.yaml
          cd "$REPO"
          rm -rf "$TMP"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck tools/
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: tools

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md updated when shippable files change
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Require CHANGELOG.md to be touched if any shippable area changed.
          if echo "$CHANGED" | grep -qE '^(lib/|bin/|skills/|adapters/|templates/|catalog\.yaml|package\.json)'; then
            if ! echo "$CHANGED" | grep -qE '^CHANGELOG\.md$'; then
              echo ""
              echo "::error::Shippable files changed but CHANGELOG.md was not touched."
              echo "Add an entry under '## [Unreleased]' (see CONTRIBUTING.md)."
              exit 1
            fi
            echo "CHANGELOG.md updated alongside shippable changes — good."
          else
            echo "No shippable files changed; CHANGELOG.md not required."
          fi

  changelog-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CHANGELOG entries are one-line (E5-006)
        run: node tools/lint-changelog.js CHANGELOG.md
