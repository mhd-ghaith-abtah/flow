epics:
  - id: E1
    title: BLOCKING — Make the CLI actually work and verify it
    description: Stub CLI commands, no tests, no CI, no npm publish. The "is this real?" gate before anyone outside the maintainer tries Flow.

  - id: E2
    title: HIGH — Safety + reliability
    description: Background-reviewer deadlock, severity-label stripping, MCP mis-registration, missing health check, no uninstall path. Things that bite real users.

  - id: E3
    title: MEDIUM — Hygiene + correctness
    description: Marker false-matches, double-compression, polling cost, scope-review unproven, missing schemas, missing docs, team-share path, migration rollback, BMad coexistence.

  - id: E4
    title: LOW — Polish + release ergonomics
    description: Curl-pipe-bash, release process, CHANGELOG-per-push, post-publish testing, Caveman session slowdown, sprint.yaml regex, FAQ gap, adapter symlink edge.

  - id: E5
    title: FOLLOWUP — Out-of-list improvements that fell out of v0.7 work
    description: Bonus capabilities surfaced by closing the 28: flow CLI parity (doctor, install, add/remove), broader test coverage.

