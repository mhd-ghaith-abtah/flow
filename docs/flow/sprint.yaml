# Flow's own sprint state — Flow dogfooding Flow.
#
# Source: the 28-issue v0.6.1 review handoff. Mapped to 4 epics by severity.
# 25 of 28 closed in v0.7.0 + post-release commits. 3 remain.
#
# Status convention:
#   backlog    — not started
#   doing      — branch checked out, work in progress
#   review     — PR open, awaiting merge
#   done       — PR merged or commit landed
#   cancelled  — abandoned
#   deferred   — moved to docs/flow/deferred.md (out of current scope)

