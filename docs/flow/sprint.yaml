# Flow's own sprint state — Flow dogfooding Flow.
#
# Source: the 28-issue v0.6.1 review handoff. Mapped to 4 epics by severity.
# 25 of 28 closed in v0.7.0 + post-release commits. 3 remain.
#
# Status convention:
#   backlog    — not started
#   doing      — branch checked out, work in progress
#   review     — PR open, awaiting merge
#   done       — PR merged or commit landed
#   cancelled  — abandoned
#   deferred   — moved to docs/flow/deferred.md (out of current scope)

version: 1
project: flow
generated: 2026-05-19
last_updated: 2026-05-19

metadata:
  scope_reviews:
    - date: 2026-05-19
      report_path: docs/flow/scope-reviews/2026-05-19.md
      suggested_counts: { merges: 3, drops: 3, splits: 3, adds: 7, epic_changes: 3 }
      applied_counts:   { merges: 3, drops: 3, splits: 3, adds: 7, epic_changes: 1 }
      notes: |
        First dogfood run on Flow's own backlog. Light epic-axis change applied (rename E5
        FOLLOWUP → "CLI + release-hardening" + note v0.8 re-cut plan). Full structural re-cut
        deferred to v0.8 when new stories actually land — rebucketing 26/32 done stories was
        deemed thrash. Honest postmortem in the report flagged E5 as scope creep
        (bonus CLI work not on original 28-issue list) and E3-007 docs story as too coarse.

epics:
  - id: E1
    title: BLOCKING — Make the CLI actually work and verify it
    description: Stub CLI commands, no tests, no CI, no npm publish. The "is this real?" gate before anyone outside the maintainer tries Flow.

  - id: E2
    title: HIGH — Safety + reliability
    description: Background-reviewer deadlock, severity-label stripping, MCP mis-registration, missing health check, no uninstall path. Things that bite real users.

  - id: E3
    title: MEDIUM — Hygiene + correctness
    description: Marker false-matches, double-compression, polling cost, scope-review unproven, missing schemas, missing docs, team-share path, migration rollback, BMad coexistence.

  - id: E4
    title: LOW — Polish + release ergonomics
    description: Curl-pipe-bash, release process, CHANGELOG-per-push, post-publish testing, Caveman session slowdown, sprint.yaml regex, FAQ gap, adapter symlink edge.

  - id: E6
    title: npx-first install ceremony (v0.8)
    description: |
      Port `/flow-init`'s Q&A + upstream dispatch to Node CLI so Flow installs
      via `npx -y @mhd-ghaith-abtah/flow init` without requiring Claude Code.
      Slash-command path stays canonical for in-Claude-Code use.
      See ROADMAP.md → v0.8.

  - id: E7
    title: ECC project-scope support (v0.8)
    description: |
      File upstream PR adding `claude-project` target adapter to ECC, then
      wire Flow's catalog + `/flow-init` Q&A to honor project vs user scope
      for ECC installs. Team-profile defaults to project scope.
      See ROADMAP.md → v0.8.

  - id: E8
    title: Multi-agent support (v0.9, demand-gated)
    description: |
      Flow installs for Codex, Cline, Cursor, and 30+ other agents that
      BMad / ECC / Caveman already support. Upstreams do the heavy lifting;
      Flow needs to (a) pass per-agent flag, (b) install its own skills to
      per-agent dirs. `/flow-story` orchestration stays Claude Code only
      (separate deferred epic E8-MCP).
      See ROADMAP.md → v0.9.

  - id: E9
    title: Beta soak → stable promotion (v0.7.x)
    description: |
      Soak v0.7.2-beta.0 for ≥7 days, cut clean v0.7.2 non-beta, promote
      to npm `latest`. Track external bug reports.
      See ROADMAP.md → v0.7.x.

  - id: E5
    title: CLI + release-hardening
    description: |
      Was "FOLLOWUP — out-of-list improvements" through v0.7. Renamed at scope-review-2026-05-19
      after the dogfood report flagged FOLLOWUP as a Misc-bucket anti-pattern. Holds:
        - flow CLI parity (doctor / install / add / remove) — shipped in v0.7 (E5-001)
        - --repair-upstream flag — backlog (E5-005)
        - CHANGELOG line-length CI — backlog (E5-006)
        - Multi-repo team profile — wontfix-until-demand (E5-007)
        - Post-publish smoke — merged into E1-002
      v0.8 should re-cut all open work by story-family (`cli`, `caveman-scope`, `release-pipeline`,
      `observability`, `docs`, `tests`) and demote severity to a `priority:` field on each story.
      E1 BLOCKING is effectively closed (only npm-publish E1-002 left); retire E1 after v0.8 cut
      and move E1-002 into a `release` epic alongside E4-002 + E5-005..006.

